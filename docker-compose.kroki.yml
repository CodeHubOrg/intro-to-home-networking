services:
  kroki:
    image: yuzutech/kroki:0.30.1
    depends_on:
      - mermaid
    environment:
      - KROKI_MERMAID_HOST=mermaid
      - KROKI_MERMAID_PORT=8002
    ports:
      - "8000:8000"
    tmpfs:
      - /tmp:exec

  mermaid:
    image: yuzutech/kroki-mermaid:0.30.1
    expose:
      - "8002"
