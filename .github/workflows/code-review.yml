name: Code Review

# Automated Claude code review on new pull requests.
# Authenticated with a Claude Pro/Max subscription via an OAuth token
# (repo secret CLAUDE_CODE_OAUTH_TOKEN, generated locally with `claude setup-token`).
#
# `reopened` lets you re-run a review by closing and reopening a PR.
# To re-review on every push as well, add `synchronize` to the `types` list.
on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by claude-code-action to fetch an OIDC token

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # The review needs the repo checked out (with full history so it can
      # diff the PR against its base); without this the action fails with
      # "fatal: not a git repository".
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
