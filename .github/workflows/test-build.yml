name: Test slide build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - slides.qmd
      - _quarto.yml
      - custom.scss
      - assets/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/test-build.yml
  pull_request:
    paths:
      - slides.qmd
      - _quarto.yml
      - custom.scss
      - assets/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38

      - name: Install D2
        run: |
          curl -fsSL https://d2lang.com/install.sh | sh -s -- --version v0.7.1 --prefix "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build slides
        run: quarto render slides.qmd

      - name: Verify output exists
        run: test -f slides.html && echo "Build successful: slides.html exists"
