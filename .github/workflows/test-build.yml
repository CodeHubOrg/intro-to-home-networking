name: Test slide build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - slides.md
      - assets/**
      - scripts/**
      - docker-compose.kroki.yml
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/test-build.yml
  pull_request:
    paths:
      - slides.md
      - assets/**
      - scripts/**
      - docker-compose.kroki.yml
      - package.json
      - pnpm-lock.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Kroki services
        run: docker compose -f docker-compose.kroki.yml up -d

      - name: Wait for Kroki to become ready
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "Kroki is ready"
              exit 0
            fi
            sleep 2
          done

          echo "Kroki failed to become ready" >&2
          docker compose -f docker-compose.kroki.yml logs >&2 || true
          exit 1

      - name: Lint
        run: pnpm lint

      - name: Build slides
        env:
          KROKI_ENDPOINT: http://127.0.0.1:8000
        run: pnpm build

      - name: Stop Kroki services
        if: always()
        run: docker compose -f docker-compose.kroki.yml down --remove-orphans

      - name: Verify output file exists
        run: test -f dist/index.html && echo "Build successful: dist/index.html exists"
