name: Test slide build

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - slides.md
      - assets/**
      - scripts/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/test-build.yml
  pull_request:
    paths:
      - slides.md
      - assets/**
      - scripts/**
      - package.json
      - pnpm-lock.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build slides
        run: pnpm build

      - name: Verify output file exists
        run: test -f dist/index.html && echo "Build successful: dist/index.html exists"
